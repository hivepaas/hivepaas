version: "3"

services:
  frontend:
    image: crccheck/hello-world:latest
    networks:
      - localpaas_net
      - local_net
    ports:
      - target: 80 # Container port
        published: 8000 # Host port
        protocol: tcp
        mode: host

  backend:
    image: crccheck/hello-world:latest
    networks:
      - localpaas_net
      - local_net

  db:
    image: crccheck/hello-world:latest
    networks:
      - localpaas_net
      - local_net

networks:
  localpaas_net:
    external: true
  local_net:
    driver: overlay
    attachable: true
