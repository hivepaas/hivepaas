name: '[Dev] Build and Deploy'

on:
  push:
    tags:
      - 'dev-**'

env:
  IMAGE_NAME: localpaas/localpaas-dev

jobs:
  build-image:
    strategy:
      matrix:
        include:
          # Intel/AMD builds run on the standard runner
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64

          # ARM builds run natively on the ARM runner!
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    # Dynamically select the correct runner machine from the matrix
    runs-on: ${{ matrix.runner }}

    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          submodules: recursive
      -
        name: Get tag
        run: echo "TAG_VERSION=${GITHUB_REF_NAME#dev-v}" >> $GITHUB_ENV
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push natively
        uses: docker/build-push-action@v7
        with:
          file: deployment/dev/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          # We can use the 'arch' directly from our matrix block now
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }}

  create-image-manifest:
    needs: build-image
    runs-on: ubuntu-latest # This can run on standard AMD64 since it's just pushing text

    steps:
      -
        name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Create and push multi-arch manifest
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#dev-v}
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.IMAGE_NAME }}:${TAG_VERSION} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-amd64 \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}-arm64
#      -
#        name: Clean up intermediate tags
#        run: |
#          # Authenticate to Docker Hub API
#          TOKEN=$(curl -s -X POST \
#            -H "Content-Type: application/json" \
#            -d '{"username": "${{ secrets.DOCKERHUB_USERNAME }}", "password": "${{ secrets.DOCKERHUB_TOKEN }}"}' \
#            https://hub.docker.com/v2/users/login/ | jq -r .token)
#
#          # Delete intermediate tags
#          curl -s -X DELETE -H "Authorization: JWT ${TOKEN}" \
#            https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${{ github.sha }}-amd64/
#
#          curl -s -X DELETE -H "Authorization: JWT ${TOKEN}" \
#            https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${{ github.sha }}-arm64/

  deploy-app:
    needs: create-image-manifest
    runs-on: ubuntu-latest
    steps:
      - name: Deploy LocalPaaS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SRV_IP }}
          port: ${{ secrets.DEV_SRV_SSH_PORT }}
          username: ${{ secrets.DEV_SRV_USERNAME }}
          password: ${{ secrets.DEV_SRV_PASSWORD }}
          script: curl -sL "https://raw.githubusercontent.com/localpaas/localpaas/main/deployment/dev/install.sh" | bash
