name: '[Dev] Build and Deploy'

on:
  push:
    tags:
      - 'dev-**'

#on:
#  workflow_run:
#    workflows: ["CI Build"] # Must match the 'name' field in build.yml
#    types:
#      - completed

jobs:
  build_x86_image:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          submodules: recursive
      -
        name: Get tag
        run: echo "TAG_VERSION=${GITHUB_REF_NAME#dev-v}" >> $GITHUB_ENV
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push image
        uses: docker/build-push-action@v7
        with:
          push: true
          file: deployment/dev/Dockerfile
          platforms: linux/amd64
          tags: |
            localpaas/localpaas-dev:${{ env.TAG_VERSION }}
            localpaas/localpaas-dev:latest

  deploy:
    # Optional (AI suggests): only run if the first workflow succeeded
    # if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: build_x86_image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy LocalPaaS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SRV_IP }}
          port: ${{ secrets.DEV_SRV_SSH_PORT }}
          username: ${{ secrets.DEV_SRV_USERNAME }}
          password: ${{ secrets.DEV_SRV_PASSWORD }}
          script: curl -sL "https://raw.githubusercontent.com/localpaas/localpaas/main/deployment/dev/install.sh" | bash
